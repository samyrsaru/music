<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #18181b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .gradient-bg {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(34, 197, 94, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .content {
      position: relative;
      z-index: 1;
      padding: 60px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo-sound {
      color: #22c55e;
    }
    .logo-domain {
      color: #a1a1aa;
    }
    .subtitle {
      font-size: 28px;
      color: #71717a;
      font-weight: 500;
      margin-top: 24px;
    }
    .wave-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      padding: 0 100px;
      opacity: 0.3;
    }
    .wave-bar {
      width: 8px;
      background: #22c55e;
      border-radius: 4px 4px 0 0;
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="content">
    <div class="logo">
      <span class="logo-sound">sound</span><span class="logo-domain">.likeahe.ro</span>
    </div>
    <p class="subtitle">AI Music Generator</p>
  </div>
  <div class="wave-container">
    <div class="wave-bar" style="height: 40px;"></div>
    <div class="wave-bar" style="height: 70px;"></div>
    <div class="wave-bar" style="height: 50px;"></div>
    <div class="wave-bar" style="height: 90px;"></div>
    <div class="wave-bar" style="height: 60px;"></div>
    <div class="wave-bar" style="height: 100px;"></div>
    <div class="wave-bar" style="height: 45px;"></div>
    <div class="wave-bar" style="height: 80px;"></div>
    <div class="wave-bar" style="height: 55px;"></div>
    <div class="wave-bar" style="height: 95px;"></div>
    <div class="wave-bar" style="height: 65px;"></div>
    <div class="wave-bar" style="height: 85px;"></div>
    <div class="wave-bar" style="height: 50px;"></div>
    <div class="wave-bar" style="height: 75px;"></div>
    <div class="wave-bar" style="height: 60px;"></div>
    <div class="wave-bar" style="height: 90px;"></div>
    <div class="wave-bar" style="height: 45px;"></div>
    <div class="wave-bar" style="height: 70px;"></div>
    <div class="wave-bar" style="height: 55px;"></div>
    <div class="wave-bar" style="height: 80px;"></div>
  </div>
</body>
</html>
